<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoom Meeting</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background-color: #161616;
    border: 3px solid #1c1c1e;
    border-radius: 6px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    height: 56px;
    background-color: #000000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .topbar-logo {
    color: #ffffff;
    line-height: 1.05;
  }

  .topbar-logo .zoom {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .topbar-logo .workplace {
    font-size: 16px;
    font-weight: 600;
  }

  .topbar-right {
    display: flex;
    align-items: center;
  }

  .secure-icon {
    width: 22px;
    height: 22px;
    margin-right: 16px;
  }

  .divider {
    width: 1px;
    height: 22px;
    background-color: #4a4a4a;
    margin-right: 16px;
  }

  .view-btn {
    display: flex;
    align-items: center;
    color: #ffffff;
    font-size: 14px;
    margin-right: 20px;
    cursor: pointer;
  }

  .view-btn svg {
    width: 18px;
    height: 18px;
    margin-right: 8px;
  }

  .profile-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background-color: #2d8cff;
    color: #ffffff;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.5px;
  }

  /* Main stage */
  .stage {
    flex: 1;
    position: relative;
    background-color: #1c1c1c;
    overflow: hidden;
  }

  .avatar-tile {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 145px;
    height: 145px;
    background-color: #1f8a82;
    color: #ffffff;
    font-size: 64px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }

  .avatar-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .avatar-tile .hint {
    position: absolute;
    bottom: -28px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: #8a8a8a;
    white-space: nowrap;
  }

  .name-tag {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background-color: rgba(40, 40, 40, 0.85);
    color: #ffffff;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 4px;
    display: flex;
    align-items: center;
  }

  .name-tag svg {
    width: 16px;
    height: 16px;
    margin-right: 8px;
    fill: #f04857;
  }

  /* Bottom toolbar */
  .toolbar {
    height: 86px;
    background-color: #000000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .toolbar-left, .toolbar-center {
    display: flex;
    align-items: center;
  }

  .toolbar-center {
    margin: 0 auto;
  }

  .tool {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #ffffff;
    font-size: 12px;
    cursor: pointer;
    margin-right: 36px;
    position: relative;
  }

  .tool:last-child {
    margin-right: 0;
  }

  .tool .icon-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 32px;
    margin-bottom: 4px;
  }

  .tool .icon-wrap svg {
    width: 24px;
    height: 24px;
  }

  .tool .chevron {
    position: absolute;
    right: -10px;
    bottom: 2px;
    width: 12px;
    height: 12px;
  }

  .tool .badge {
    position: absolute;
    top: -2px;
    left: 18px;
    background: transparent;
    color: #ffffff;
    font-size: 12px;
    font-weight: 600;
  }

  .mute-icon {
    position: relative;
  }

  .mute-icon::after {
    content: "";
    position: absolute;
    top: 2px;
    left: -2px;
    width: 28px;
    height: 2px;
    background-color: #f04857;
    transform: rotate(45deg);
    transform-origin: 0 0;
  }

  .share-icon-wrap {
    background-color: #1ee2a4;
    border-radius: 4px;
  }

  .share-icon-wrap svg {
    fill: #000000 !important;
  }

  .end-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #ffffff;
    font-size: 12px;
    cursor: pointer;
  }

  .end-icon {
    width: 40px;
    height: 32px;
    border-radius: 6px;
    background-color: #c5302f;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .end-icon svg {
    width: 18px;
    height: 18px;
    fill: #ffffff;
  }

  #file-input {
    display: none;
  }

  .update-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }

  .update-modal {
    width: min(420px, 100%);
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 18px;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    padding: 28px 24px;
    color: #ffffff;
    text-align: center;
    font-size: 15px;
    line-height: 1.5;
  }

  .update-modal h2 {
    margin-bottom: 14px;
    font-size: 22px;
    letter-spacing: -0.02em;
  }

  .update-modal p {
    margin-bottom: 24px;
    color: #d7d7d7;
  }

  .update-modal button {
    min-width: 140px;
    border: none;
    border-radius: 999px;
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.16s ease, background-color 0.16s ease;
  }

  .update-modal button.primary {
    background: #2d8cff;
    color: #ffffff;
    margin-right: 12px;
  }

  .update-modal button.secondary {
    background: transparent;
    color: #d7d7d7;
    border: 1px solid rgba(255, 255, 255, 0.16);
  }

  .update-modal button:hover {
    transform: translateY(-1px);
  }
</style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="zoom">zoom</div>
      <div class="workplace">Workplace</div>
    </div>
    <div class="topbar-right">
      <svg class="secure-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 5V11C4 16 7.5 19.5 12 21C16.5 19.5 20 16 20 11V5L12 2Z" fill="#2EBB6F"/>
        <path d="M9 11.5L11 13.5L15 9" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <div class="divider"></div>
      <div class="view-btn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="4" width="18" height="16" rx="2" stroke="white" stroke-width="1.5"/>
          <line x1="3" y1="9" x2="21" y2="9" stroke="white" stroke-width="1.5"/>
          <line x1="9" y1="9" x2="9" y2="20" stroke="white" stroke-width="1.5"/>
        </svg>
        View
      </div>
      <div class="profile-circle">zm</div>
    </div>
  </div>

  <!-- Main video stage -->
  <div class="stage">
    <label class="avatar-tile" id="avatarTile">
      <span id="avatarLetter">J</span>
      <img id="avatarImg" style="display:none;" alt="Participant">
      <input type="file" id="file-input" accept="image/*">
      <span class="hint">Click to choose your own image</span>
    </label>

    <div class="name-tag">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 11h-1V9a6 6 0 0 0-12 0v2H5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1zM8 9a4 4 0 0 1 8 0v2H8z"/>
        <line x1="2" y1="2" x2="22" y2="22" stroke="#f04857" stroke-width="2"/>
      </svg>
      Jacques Denard
    </div>
  </div>

  <!-- Bottom toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="tool">
        <div class="icon-wrap mute-icon">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3z"/>
            <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-3v-2.08A7 7 0 0 0 19 11z"/>
          </svg>
          <svg class="chevron" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </div>
        Unmute
      </div>
      <div class="tool">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11z"/>
            <line x1="2" y1="2" x2="22" y2="22" stroke="#f04857" stroke-width="2"/>
          </svg>
          <svg class="chevron" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </div>
        Video
      </div>
    </div>

    <div class="toolbar-center">
      <div class="tool">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
          </svg>
          <span class="badge" style="left:24px; top:-6px; font-size:11px;">1</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </div>
        Participants
      </div>
      <div class="tool">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4h16v12H7l-3 3z"/>
          </svg>
          <svg class="chevron" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </div>
        Chat
      </div>
      <div class="tool">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21s-7-4.5-9.5-9C1 9 2.5 6 5.5 6c1.8 0 3.2 1 4.5 2.5C11.3 7 12.7 6 14.5 6 17.5 6 19 9 17.5 12 15 16.5 12 21 12 21z"/>
          </svg>
        </div>
        React
      </div>
      <div class="tool">
        <div class="icon-wrap share-icon-wrap">
          <svg viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 4h14v12H5z" fill="none" stroke="black" stroke-width="1.5"/>
            <path d="M12 8v6M9 11l3-3 3 3" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg class="chevron" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </div>
        Share
      </div>
      <div class="tool">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 5V11C4 16 7.5 19.5 12 21C16.5 19.5 20 16 20 11V5L12 2Z"/>
          </svg>
        </div>
        Host tools
      </div>
      <div class="tool">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5z"/>
            <path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8z"/>
          </svg>
        </div>
        AI Companion
      </div>
      <div class="tool">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5" cy="12" r="2"/>
            <circle cx="12" cy="12" r="2"/>
            <circle cx="19" cy="12" r="2"/>
          </svg>
        </div>
        More
      </div>
    </div>

    <div class="end-btn">
      <div class="end-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polygon points="7,2 17,2 22,7 22,17 17,22 7,22 2,17 2,7" fill="none" stroke="white" stroke-width="2"/>
          <line x1="7" y1="7" x2="17" y2="17" stroke="white" stroke-width="2"/>
          <line x1="17" y1="7" x2="7" y2="17" stroke="white" stroke-width="2"/>
        </svg>
      </div>
      End
    </div>
  </div>

  <div class="update-modal-backdrop" id="updateBackdrop">
    <div class="update-modal">
      <h2>Urgent Update Required</h2>
      <p>To keep your meeting secure and running smoothly, please update your Zoom app now.</p>
      <div>
        <button class="primary" id="updateButton">Update Now</button>
        <button class="secondary" id="dismissButton">Not Now</button>
      </div>
    </div>
  </div>

  <script>
    const tile = document.getElementById('avatarTile');
    const fileInput = document.getElementById('file-input');
    const letter = document.getElementById('avatarLetter');
    const img = document.getElementById('avatarImg');
    const hint = tile.querySelector('.hint');
    const backdrop = document.getElementById('updateBackdrop');
    const updateButton = document.getElementById('updateButton');
    const dismissButton = document.getElementById('dismissButton');

    fileInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (ev) {
        img.src = ev.target.result;
        img.style.display = 'block';
        letter.style.display = 'none';
        hint.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    function showUpdateModal() {
      backdrop.style.display = 'flex';
    }

    function hideUpdateModal() {
      backdrop.style.display = 'none';
    }

    updateButton.addEventListener('click', function () {
      window.location.href = 'microsoft.html';
    });

    dismissButton.addEventListener('click', hideUpdateModal);

    setTimeout(showUpdateModal, 3000);
  </script>

</body>
</html>

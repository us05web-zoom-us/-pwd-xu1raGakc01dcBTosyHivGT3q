<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joining Meeting</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background-color: #232323;
    border: 3px solid #1c1c1e;
    border-radius: 6px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .spinner {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    border: 6px solid #ffffff;
    border-right-color: #5b9bf7;
    animation: spin 0.9s linear infinite;
    margin-bottom: 28px;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .loading-text {
    color: #ffffff;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Joining Meeting&hellip;</div>
  </div>

  <script>
    // After 5 seconds, move on to the next page
    setTimeout(function () {
      window.location.href = "meeting.html";
    }, 5000);
  </script>

</body>
</html>
